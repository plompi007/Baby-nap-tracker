<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב שינה — תינוק</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f5f7fa;
  --s1:      #ffffff;
  --s2:      #ffffff;
  --s3:      #f0f3f8;
  --border:  #e4e9f2;
  --border2: #d0d8e8;

  --moon:  #4a7ee8;
  --sun:   #e8952a;
  --yawn:  #8b5cf6;
  --cry:   #ef4444;
  --poop:  #92621a;
  --feed:  #10b981;

  --text:  #1a2035;
  --muted: #6b7a9a;
  --dim:   #9aa3b8;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);

  --r: 16px;
  --r-sm: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Rubik', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══ LAYOUT ═══ */
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* ═══ HEADER ═══ */
.header {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.header-left { display: flex; align-items: center; gap: 14px; }

.moon-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #e8f0fd, #d0e2fb);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: var(--shadow-sm);
}

.header-title { font-size: 17px; font-weight: 600; color: var(--text); }
.header-sub   { font-size: 12px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }

.header-now {
  background: var(--s3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  box-shadow: var(--shadow-sm);
}

/* ═══ NAV ═══ */
.nav {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  gap: 0;
}

.nav-btn {
  padding: 13px 18px;
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--moon); border-bottom-color: var(--moon); font-weight: 600; }

/* ═══ MAIN ═══ */
.content { flex: 1; padding: 24px; max-width: 1000px; margin: 0 auto; width: 100%; }

.page { display: none; animation: fadeIn .25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ═══ ADD PANEL ═══ */
.add-panel {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
  box-shadow: var(--shadow-sm);
}

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

.field input, .field select {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 8px 11px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  min-width: 0;
}
.field input:focus, .field select:focus { border-color: var(--moon); box-shadow: 0 0 0 3px rgba(74,126,232,.12); }
.field select option { background: var(--s1); }

.btn-add {
  background: var(--moon);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 9px 20px;
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
  white-space: nowrap;
}
.btn-add:hover { opacity: .85; }
.btn-add:active { transform: scale(.97); }

.btn-now {
  background: var(--s3);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
  display: block;
  width: 100%;
  text-align: center;
}
.btn-now:hover { color: var(--moon); border-color: var(--moon); background: rgba(74,126,232,.06); }

/* ═══ STAT CARDS ═══ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 16px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s, transform .2s;
}
.stat-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: var(--r) var(--r) 0 0;
}
.stat-card.c-moon::before  { background: linear-gradient(90deg, var(--moon), #7aa8f5); }
.stat-card.c-sun::before   { background: linear-gradient(90deg, var(--sun), #f5c47a); }
.stat-card.c-yawn::before  { background: linear-gradient(90deg, var(--yawn), #b08af5); }
.stat-card.c-feed::before  { background: linear-gradient(90deg, var(--feed), #5ee8b8); }

.stat-icon { font-size: 20px; margin-bottom: 10px; }
.stat-val  { font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 4px; }
.stat-lbl  { font-size: 11px; color: var(--muted); font-weight: 500; }
.stat-sub  { font-size: 10px; color: var(--dim); margin-top: 3px; font-family: 'DM Mono', monospace; }

.stat-card.c-moon .stat-val  { color: var(--moon); }
.stat-card.c-sun .stat-val   { color: var(--sun); }
.stat-card.c-yawn .stat-val  { color: var(--yawn); }
.stat-card.c-feed .stat-val  { color: var(--feed); }

/* ═══ SECTION HEADERS ═══ */
.section-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  margin-top: 28px;
}
.section-hdr:first-child { margin-top: 0; }
.section-hdr h2 { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }

/* ═══ DAY CARD ═══ */
.day-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s;
}
.day-card:hover { box-shadow: var(--shadow); }

.day-card-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid transparent;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.day-card.open .day-card-hdr { border-bottom-color: var(--border); }
.day-card-hdr:hover { background: var(--bg); }

.day-title { font-size: 14px; font-weight: 600; }
.day-meta  { display: flex; gap: 8px; align-items: center; }

.pill {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
}
.pill-moon  { background: #eff6ff; color: #2563eb; }
.pill-sun   { background: #fff7ed; color: #c27e1a; }
.pill-yawn  { background: #f5f3ff; color: #7c3aed; }
.pill-ok    { background: #ecfdf5; color: #059669; }
.pill-short { background: #fff7ed; color: #c27e1a; }
.pill-long  { background: #fef2f2; color: #dc2626; }

.chevron { color: var(--muted); font-size: 12px; transition: transform .25s; }
.day-card.open .chevron { transform: rotate(180deg); }

.day-body { display: none; }
.day-card.open .day-body { display: block; }

/* ═══ EVENT TABLE ═══ */
.ev-table { width: 100%; border-collapse: collapse; }

.ev-table th {
  font-size: 10px;
  font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .07em;
  padding: 8px 18px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.ev-table td {
  padding: 11px 18px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.ev-table tr:last-child td { border-bottom: none; }
.ev-table tr:hover td { background: rgba(74,126,232,.04); }

.time-cell {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}

.event-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
}

.ev-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ev-dot-sleep { background: var(--moon); }
.ev-dot-wake  { background: var(--sun); }
.ev-dot-yawn  { background: var(--yawn); }
.ev-dot-cry   { background: var(--cry); }
.ev-dot-poop  { background: var(--poop); }
.ev-dot-feed  { background: var(--feed); }

.info-chip {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 500;
}
.ic-ww-short { background: #fff7ed; color: #c27e1a; border: 1px solid #fde7b4; }
.ic-ww-ok    { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
.ic-ww-long  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.ic-dur      { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }

.del-btn {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 13px;
  padding: 4px 6px;
  border-radius: 4px;
  transition: color .15s, background .15s;
  line-height: 1;
}
.del-btn:hover { color: var(--cry); background: rgba(245,97,122,.1); }

.note-text { font-size: 11px; color: var(--muted); }

/* ═══ TIMELINE ═══ */
.tl-wrap { padding: 14px 16px; }
.tl-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; font-family: 'DM Mono', monospace; }

.tl-bar {
  position: relative;
  height: 28px;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid var(--border);
  overflow: visible;
  margin-bottom: 4px;
}

.tl-seg {
  position: absolute;
  top: 0; height: 100%;
  border-radius: 0;
}
.tl-seg:first-child { border-radius: 5px 0 0 5px; }
.tl-seg:last-of-type { border-radius: 0 5px 5px 0; }
.tl-seg.s-sleep { background: rgba(74,126,232,.5); }
.tl-seg.s-wake  { background: rgba(232,149,42,.18); }

.tl-dot {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 9px; height: 9px;
  border-radius: 50%;
  z-index: 2;
  cursor: pointer;
  transition: transform .15s;
  box-shadow: 0 0 0 2px #fff;
}
.tl-dot:hover { transform: translate(-50%, -50%) scale(1.6); }
.tl-dot.d-yawn { background: var(--yawn); }
.tl-dot.d-cry  { background: var(--cry); }
.tl-dot.d-poop { background: var(--poop); }
.tl-dot.d-feed { background: var(--feed); }

.tl-hours {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--dim);
  font-family: 'DM Mono', monospace;
  padding: 0 2px;
}

/* ═══ STATS PAGE ═══ */
.stats-full-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

/* WW distribution bar */
.ww-dist {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}

.ww-dist h3 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px; }

.ww-bar-wrap { margin-bottom: 14px; }
.ww-bar-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--muted); margin-bottom: 5px;
}
.ww-bar-track {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
}
.ww-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .6s ease;
}

.insight-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}

.insight-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s;
}
.insight-card:hover { box-shadow: var(--shadow); }

.insight-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.ii-moon  { background: #eff6ff; }
.ii-sun   { background: #fff7ed; }
.ii-yawn  { background: #f5f3ff; }
.ii-warn  { background: #fef2f2; }
.ii-ok    { background: #ecfdf5; }

.insight-text { flex: 1; }
.insight-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.insight-body  { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* Per-day table */
.per-day-table {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.per-day-table table { width: 100%; border-collapse: collapse; }
.per-day-table th {
  font-size: 10px; font-weight: 700; color: var(--dim);
  text-transform: uppercase; letter-spacing: .07em;
  padding: 10px 16px; text-align: right;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.per-day-table td {
  padding: 10px 16px; font-size: 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.per-day-table tr:last-child td { border-bottom: none; }
.per-day-table tr:hover td { background: rgba(74,126,232,.04); }

/* ═══ HEATMAP ═══ */
.heatmap-wrap {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 12px;
  overflow-x: auto;
}
.heatmap-wrap h3 {
  font-size: 12px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px;
}
.heatmap-sub {
  font-size: 11px; color: var(--dim); margin-bottom: 16px;
  font-family: 'DM Mono', monospace;
}
.heatmap-chart {
  position: relative;
  width: 100%;
  min-width: 320px;
}
.heatmap-row {
  display: flex;
  align-items: center;
  margin-bottom: 3px;
}
.heatmap-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  width: 38px;
  flex-shrink: 0;
  text-align: left;
}
.heatmap-cells {
  display: flex;
  flex: 1;
  gap: 2px;
}
.heatmap-cell {
  flex: 1;
  height: 20px;
  border-radius: 3px;
  position: relative;
  cursor: pointer;
  transition: transform .1s;
}
.heatmap-cell:hover { transform: scaleY(1.3); z-index: 1; }

.heatmap-x-labels {
  display: flex;
  margin-right: 0;
  margin-top: 6px;
  padding-right: 38px; /* offset for row label width */
}
.heatmap-x-label {
  flex: 1;
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  color: var(--dim);
  text-align: center;
}

.heatmap-legend {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  font-size: 11px;
  color: var(--muted);
}
.legend-gradient {
  flex: 1;
  max-width: 160px;
  height: 8px;
  border-radius: 4px;
  background: linear-gradient(to left, rgba(91,141,238,.85), rgba(91,141,238,.05));
}
.legend-gradient-wake {
  flex: 1;
  max-width: 160px;
  height: 8px;
  border-radius: 4px;
  background: linear-gradient(to left, rgba(245,167,66,.85), rgba(245,167,66,.05));
}

/* ═══ EMPTY ═══ */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 14px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .5; }

/* ═══ MINI CLOCK ═══ */
#live-clock { transition: color .2s; }

/* ═══ EDIT MODAL ═══ */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,32,53,.4);
  backdrop-filter: blur(6px);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  width: 360px;
  max-width: 95vw;
  box-shadow: var(--shadow-lg);
  animation: modalIn .2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.95) translateY(8px); }
  to   { opacity: 1; transform: none; }
}

.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.modal-hdr h3 { font-size: 15px; font-weight: 600; color: var(--text); }
.modal-close {
  background: var(--bg); border: 1px solid var(--border); color: var(--muted);
  font-size: 18px; cursor: pointer; padding: 2px 6px;
  border-radius: 6px; line-height: 1;
  transition: color .15s, background .15s;
}
.modal-close:hover { color: var(--cry); background: rgba(245,97,122,.1); }

.modal-field { margin-bottom: 14px; }
.modal-field label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 5px;
}
.modal-field input, .modal-field select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--moon); box-shadow: 0 0 0 3px rgba(74,126,232,.12); }
.modal-field select option { background: var(--s1); }

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.btn-save {
  flex: 1;
  background: var(--moon);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-save:hover { opacity: .85; }
.btn-cancel {
  background: var(--s3);
  border: 1px solid var(--border2);
  color: var(--muted);
  border-radius: 8px;
  padding: 10px 16px;
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: color .15s;
}
.btn-cancel:hover { color: var(--text); }

/* edit button in table */
.edit-btn {
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  color: #2563eb;
  cursor: pointer;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background .15s;
  line-height: 1;
}
.edit-btn:hover { background: #dbeafe; }
.del-btn {
  background: #fef2f2;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhsemdrVMDnvtvpXaRmNIvz0aCckrmXsI",
  authDomain: "baby-nap-time.firebaseapp.com",
  projectId: "baby-nap-time",
  storageBucket: "baby-nap-time.firebasestorage.app",
  messagingSenderId: "785269005585",
  appId: "1:785269005585:web:fd684be9f38edfcd9280b0"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const COL = "entries";

// ── sync status indicator ──────────────────────────
function setSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    ok:      { text: '✓ מסונכרן',   color: 'var(--feed)' },
    saving:  { text: '⏳ שומר...',   color: 'var(--sun)'  },
    loading: { text: '⏳ טוען...',   color: 'var(--sun)'  },
    error:   { text: '⚠️ שגיאה',    color: 'var(--cry)'  },
  };
  const s = map[status] || map.ok;
  el.textContent = s.text;
  el.style.color = s.color;
}

// ── seed Firestore once if empty ───────────────────
async function seedIfEmpty(seedData) {
  const snap = await getDocs(collection(db, COL));
  if (!snap.empty) return; // already has data
  setSyncStatus('saving');
  const batch = seedData.map(e =>
    setDoc(doc(db, COL, String(e.id)), e)
  );
  await Promise.all(batch);
  setSyncStatus('ok');
}

// ── real-time listener ─────────────────────────────
function startListener() {
  setSyncStatus('loading');
  const q = query(collection(db, COL));
  onSnapshot(q, snap => {
    entries = snap.docs.map(d => d.data());
    entries.sort((a,b) => a.d.localeCompare(b.d) || a.t.localeCompare(b.t));
    setSyncStatus('ok');
    renderPage(window._currentPage || 'dashboard');
  }, err => {
    console.error(err);
    setSyncStatus('error');
  });
}

// ── override save/load/delete to use Firestore ─────
window._fbAddEntry = async function(entry) {
  setSyncStatus('saving');
  await setDoc(doc(db, COL, String(entry.id)), entry);
  // listener will re-render automatically
};

window._fbDeleteEntry = async function(id) {
  setSyncStatus('saving');
  await deleteDoc(doc(db, COL, String(id)));
};

window._fbUpdateEntry = async function(entry) {
  setSyncStatus('saving');
  await setDoc(doc(db, COL, String(entry.id)), entry);
};

window._fbReady = true;

// ── init Firebase after main app is ready ─────────
window.addEventListener('appReady', async () => {
  await seedIfEmpty(window._SEED);
  startListener();
});

</script>

// ════════════════════════════════════
// UTILS
// ════════════════════════════════════
const toMin = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const fmtDur = m => m<60 ? m+'ד׳' : Math.floor(m/60)+'ש׳'+(m%60?' '+(m%60)+'ד׳':'');
const avg = a => a.length ? Math.round(a.reduce((s,x)=>s+x,0)/a.length) : 0;
const HE_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function heDate(d) {
  const dt = new Date(d+'T12:00:00');
  return `יום ${HE_DAYS[dt.getDay()]} ${dt.getDate()}/${dt.getMonth()+1}`;
}

function groupByDay(arr) {
  const map = {};
  arr.forEach(e => {
    if (!map[e.d]) map[e.d] = [];
    map[e.d].push(e);
  });
  for (const k in map) map[k].sort((a,b)=>a.t.localeCompare(b.t));
  return map;
}

function getWakeWindows(evs) {
  const wws = [];
  evs.forEach((e,i) => {
    if (e.type==='sleep') {
      const prev = [...evs].slice(0,i).reverse().find(x=>x.type==='wake');
      if (prev) { const d=toMin(e.t)-toMin(prev.t); if(d>0&&d<360) wws.push(d); }
    }
  });
  return wws;
}

function getSleepDurs(evs) {
  const durs = [];
  evs.forEach((e,i) => {
    if (e.type==='wake') {
      const prev = [...evs].slice(0,i).reverse().find(x=>x.type==='sleep');
      if (prev) { const d=toMin(e.t)-toMin(prev.t); if(d>0&&d<720) durs.push(d); }
    }
  });
  return durs;
}

function wwClass(m) {
  if (m < 30) return 'short';
  if (m > 90) return 'long';
  return 'ok';
}

// TIMELINE VISUAL
// ════════════════════════════════════
function buildTimeline(evs, dayStr) {
  const START = 0, TOTAL = 24*60;
  let html = `<div class="tl-wrap">
    <div class="tl-label">${dayStr}</div>
    <div class="tl-bar">`;

  for (let i=0; i<evs.length-1; i++) {
    const cur=evs[i], nxt=evs[i+1];
    const s = Math.max(0, toMin(cur.t))/TOTAL*100;
    const w = Math.max(0, (toMin(nxt.t)-toMin(cur.t)))/TOTAL*100;
    const cls = cur.type==='sleep' ? 's-sleep' : 's-wake';
    html += `<div class="tl-seg ${cls}" style="left:${s.toFixed(2)}%;width:${w.toFixed(2)}%" title="${cur.t}→${nxt.t}"></div>`;
  }

  evs.forEach(e => {
    if (['yawn','cry','poop','feed'].includes(e.type)) {
      const left = toMin(e.t)/TOTAL*100;
      html += `<div class="tl-dot d-${e.type}" style="left:${left.toFixed(2)}%" title="${EV[e.type].label} ${e.t}${e.note?' ('+e.note+')':''}"></div>`;
    }
  });

  html += `</div>
    <div class="tl-hours">`;
  for(let h=0;h<=24;h+=3) html+=`<span>${h}</span>`;
  html += `</div></div>`;
  return html;
}

function renderDashboard() {
  const days = groupByDay(entries);
  const sortedDays = Object.keys(days).sort();
  const allEvs = [...entries].sort((a,b)=>a.d.localeCompare(b.d)||a.t.localeCompare(b.t));

  // ---- Stats ----
  let allWW=[], allSleep=[], allYts=[];
  sortedDays.forEach(d=>{
    const evs=days[d];
    allWW.push(...getWakeWindows(evs));
    allSleep.push(...getSleepDurs(evs));
    evs.forEach((e,i)=>{
      if(e.type==='yawn'){
        const ns=evs.slice(i+1).find(x=>x.type==='sleep');
        if(ns){const d2=toMin(ns.t)-toMin(e.t);if(d2>0&&d2<120)allYts.push(d2);}
      }
    });
  });

  // last night sleep (from ~18:00 to ~9:00)
  let nightSleep = 0;
  const lastDay = sortedDays[sortedDays.length-1];
  if (lastDay) {
    const prevDay = sortedDays[sortedDays.length-2];
    const nightEvs = [
      ...(prevDay ? days[prevDay].filter(e=>toMin(e.t)>=18*60) : []),
      ...days[lastDay].filter(e=>toMin(e.t)<=9*60)
    ].sort((a,b)=>a.t.localeCompare(b.t));
    nightEvs.forEach((e,i)=>{
      if(e.type==='wake'){
        const prev=[...nightEvs].slice(0,i).reverse().find(x=>x.type==='sleep');
        if(prev){const d2=toMin(e.t)-toMin(prev.t);if(d2>0&&d2<720)nightSleep+=d2;}
      }
    });
  }

  const avgWW  = avg(allWW);
  const avgSl  = avg(allSleep);
  const avgYts = avg(allYts);

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card c-moon">
      <div class="stat-icon">🌙</div>
      <div class="stat-val">${fmtDur(avgSl||0)}</div>
      <div class="stat-lbl">שינה ממוצעת</div>
      <div class="stat-sub">לפרק שינה</div>
    </div>
    <div class="stat-card c-sun">
      <div class="stat-icon">☀️</div>
      <div class="stat-val">${fmtDur(avgWW||0)}</div>
      <div class="stat-lbl">חלון ערות ממוצע</div>
      <div class="stat-sub">${allWW.length} מדידות</div>
    </div>
    <div class="stat-card c-yawn">
      <div class="stat-icon">😮</div>
      <div class="stat-val">${fmtDur(avgYts||0)}</div>
      <div class="stat-lbl">פיהוק → שינה</div>
      <div class="stat-sub">זמן הרדמות</div>
    </div>
    <div class="stat-card c-feed">
      <div class="stat-icon">🌙</div>
      <div class="stat-val">${fmtDur(nightSleep||0)}</div>
      <div class="stat-lbl">שינת לילה</div>
      <div class="stat-sub">אמש</div>
    </div>
  `;

  // ---- Last day timeline ----
  if (lastDay && days[lastDay]) {
    document.getElementById('dash-timeline').innerHTML =
      `<div class="day-card" style="overflow:hidden">` +
      buildTimeline(days[lastDay], heDate(lastDay)) +
      `<div style="display:flex;gap:16px;padding:0 16px 14px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:12px;height:8px;background:rgba(91,141,238,.55);border-radius:2px"></span>שינה</span>
        <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:12px;height:8px;background:rgba(245,167,66,.2);border-radius:2px"></span>ערות</span>
        <span style="font-size:11px;color:var(--yawn);display:flex;align-items:center;gap:5px">● פיהוק</span>
        <span style="font-size:11px;color:var(--cry);display:flex;align-items:center;gap:5px">● בכי</span>
        <span style="font-size:11px;color:var(--poop);display:flex;align-items:center;gap:5px">● קקי</span>
      </div></div>`;
  }

  // ---- Insights ----
  const insights = [];
  if (avgWW > 0 && avgWW < 30) {
    insights.push({ icon:'⚠️', cls:'ii-warn', title:'חלונות ערות קצרים', body:`ממוצע ${fmtDur(avgWW)} — מתחת ל-30ד׳ זה קצר אפילו לגיל 3 חודשים. ייתכן overtired.` });
  } else if (avgWW >= 30 && avgWW <= 70) {
    insights.push({ icon:'✅', cls:'ii-ok', title:'חלונות ערות תקינים', body:`ממוצע ${fmtDur(avgWW)} — נפיל בטווח הנורמלי לגיל זה.` });
  }
  if (avgYts > 0 && avgYts <= 20) {
    insights.push({ icon:'😴', cls:'ii-moon', title:'הרדמות מהירה', body:`${fmtDur(avgYts)} מפיהוק להרדמות — סימן שהוא נלקח בזמן.` });
  } else if (avgYts > 30) {
    insights.push({ icon:'⏳', cls:'ii-sun', title:'הרדמות אטית', body:`${fmtDur(avgYts)} מפיהוק להרדמות — אפשר לנסות להכניס קצת יותר מוקדם.` });
  }
  const shortWW = allWW.filter(w=>w<25).length;
  const pct = allWW.length ? Math.round(shortWW/allWW.length*100) : 0;
  if (pct > 40) {
    insights.push({ icon:'🔄', cls:'ii-warn', title:`${pct}% מהחלונות קצרים מ-25ד׳`, body:'ייתכן שהוא עייף-על (overtired) ולכן הגוף מכניס מהר לשינה. EC pause יכול להיות קשור לזה.' });
  }
  // night wakings
  const nightWakes = allEvs.filter(e=>e.type==='wake'&&(toMin(e.t)<6*60||toMin(e.t)>=22*60)).length;
  const nights = sortedDays.length;
  const avgNW = nights ? (nightWakes/nights).toFixed(1) : '—';
  insights.push({ icon:'🌛', cls:'ii-moon', title:`יקיצות לילה: ~${avgNW} ללילה`, body:'נורמלי לגיל 3 חודשים. רוב הלילות יקיצה אחת–שתיים לינוק.' });

  document.getElementById('dash-insights').innerHTML = insights.map(ins=>`
    <div class="insight-card">
      <div class="insight-icon ${ins.cls}">${ins.icon}</div>
      <div class="insight-text">
        <div class="insight-title">${ins.title}</div>
        <div class="insight-body">${ins.body}</div>
      </div>
    </div>`).join('');

  // ---- Recent entries ----
  const recent = [...entries].sort((a,b)=>b.d.localeCompare(a.d)||b.t.localeCompare(a.t)).slice(0,10);
  document.getElementById('dash-recent').innerHTML = buildEntriesTable(recent, true);
}

function toggleDay(day) {

  else openDays.add(day);

function buildEntriesTable(evs, showDel) {
  let html = `<table class="ev-table">
    <thead><tr>
      <th>שעה</th><th>אירוע</th><th>הערה</th><th>מידע</th>${showDel?'<th></th>':''}
    </tr></thead><tbody>`;

  const sorted = [...evs].sort((a,b)=>a.d.localeCompare(b.d)||a.t.localeCompare(b.t));

  sorted.forEach((e,i) => {
    const dayEvs = evs.filter(x=>x.d===e.d).sort((a,b)=>a.t.localeCompare(b.t));
    const idx = dayEvs.findIndex(x=>x.id===e.id);
    let info = '';

    if (idx > 0) {
      const prev = dayEvs[idx-1];
      const dur = toMin(e.t) - toMin(prev.t);
      if (dur > 0 && dur < 600) {
        if (e.type==='wake' && prev.type==='sleep') {
          info = `<span class="info-chip ic-dur">🌙 ${fmtDur(dur)}</span>`;
        } else if (e.type==='sleep' && prev.type==='wake') {
          const cls = wwClass(dur);
          info = `<span class="info-chip ic-ww-${cls}">חלון ${fmtDur(dur)}</span>`;
        } else if (e.type==='yawn') {
          const lw = [...dayEvs].slice(0,idx).reverse().find(x=>x.type==='wake');
          if (lw) {
            const ww = toMin(e.t)-toMin(lw.t);
            if (ww>0&&ww<300) {
              const cls2 = wwClass(ww);
              info = `<span class="info-chip ic-ww-${cls2}">פיהוק בעוד ${fmtDur(ww)}</span>`;
            }
          }
        }
      }
    }

    html += `<tr>
      <td class="time-cell">${e.t}</td>
      <td><span class="event-badge"><span class="ev-dot ${EV[e.type]?.dot||''}"></span>${EV[e.type]?.label||e.type}</span></td>
      <td><span class="note-text">${e.note||''}</span></td>
      <td>${info}</td>
      ${showDel?`<td><div class="row-actions"><button class="edit-btn" onclick="openEditModal(${e.id})" title="ערוך">✏️</button><button class="del-btn" onclick="delEntry(${e.id})" title="מחק">✕</button></div></td>`:''}
    </tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

// HEATMAP
// ════════════════════════════════════
function buildHeatmap(containerId, mode) {
  // mode: 'sleep' or 'wake'
  // For each 30-min slot (0..47), calculate % of days the baby was asleep/awake
  const SLOTS = 48; // 30-min slots in 24h
  const days = groupByDay(entries);
  const sortedDays = Object.keys(days).sort();
  const N = sortedDays.length;
  if (!N) return;

  // slotCounts[slot] = number of days baby was in state during that slot
  const slotCounts = new Array(SLOTS).fill(0);

  sortedDays.forEach(day => {
    const evs = days[day].slice().sort((a,b)=>a.t.localeCompare(b.t));
    // For each 30-min slot, determine state at midpoint
    for (let s = 0; s < SLOTS; s++) {
      const midMin = s * 30 + 15; // midpoint of slot in minutes from midnight
      // Find last sleep/wake event before or at midpoint
      let state = null;
      for (let i = evs.length - 1; i >= 0; i--) {
        const eMin = toMin(evs[i].t);
        if (eMin <= midMin && (evs[i].type === 'sleep' || evs[i].type === 'wake')) {
          state = evs[i].type;
          break;
        }
      }
      if (state === mode) slotCounts[s]++;
    }
  });

  const maxCount = Math.max(...slotCounts, 1);
  const color = mode === 'sleep' ? '74,126,232' : '232,149,42';
  const label = mode === 'sleep' ? 'ישן' : 'ער';

  // Build rows: group by hour (2 slots per hour)
  // We'll do one row per 2-hour block for readability, cells = 30min slots
  // Actually: one single row with all 48 cells, but show hour labels every 2
  let cellsHTML = '';
  for (let s = 0; s < SLOTS; s++) {
    const pct = slotCounts[s] / N; // 0..1
    const opacity = 0.05 + pct * 0.85;
    const daysPct = Math.round(pct * 100);
    const hour = Math.floor(s / 2);
    const min = s % 2 === 0 ? '00' : '30';
    const timeLabel = `${String(hour).padStart(2,'0')}:${min}`;
    cellsHTML += `<div class="heatmap-cell" style="background:rgba(${color},${opacity.toFixed(2)})" title="${timeLabel} — ${label} ${daysPct}% מהימים (${slotCounts[s]}/${N})"></div>`;
  }

  // X-axis labels every 2 hours
  let xLabels = '';
  for (let h = 0; h < 24; h += 2) {
    xLabels += `<span class="heatmap-x-label">${h}</span>`;
  }

  // Find peak sleep/wake window
  let peakStart = 0, peakVal = 0;
  for (let s = 0; s < SLOTS - 3; s++) {
    const window2h = slotCounts[s] + slotCounts[s+1] + slotCounts[s+2] + slotCounts[s+3];
    if (window2h > peakVal) { peakVal = window2h; peakStart = s; }
  }
  const peakHour = Math.floor(peakStart/2);
  const peakMin = peakStart%2===0?'00':'30';
  const peakEndS = peakStart+4;
  const peakEndH = Math.floor(peakEndS/2);
  const peakEndM = peakEndS%2===0?'00':'30';
  const peakPct = Math.round(peakVal/(N*4)*100);

  const subText = mode==='sleep'
    ? `שעות השינה הכי סטטיסטיות: ${peakHour}:${peakMin}–${peakEndH}:${peakEndM} (${peakPct}% מהימים)`
    : `שעות הערות הכי סטטיסטיות: ${peakHour}:${peakMin}–${peakEndH}:${peakEndM} (${peakPct}% מהימים)`;

  document.getElementById(containerId).innerHTML = `
    <div class="heatmap-wrap">
      <h3>${mode==='sleep'?'🌙 הסתברות לשינה':'☀️ הסתברות לערות'} לפי שעה ביום</h3>
      <div class="heatmap-sub">${subText} · מבוסס על ${N} ימים</div>
      <div class="heatmap-chart">
        <div class="heatmap-row">
          <div class="heatmap-label">${label}</div>
          <div class="heatmap-cells">${cellsHTML}</div>
        </div>
        <div class="heatmap-x-labels">
          ${Array.from({length:12}, (_,i)=>`<span class="heatmap-x-label">${i*2}</span>`).join('')}
        </div>
      </div>
      <div class="heatmap-legend">
        <span>נמוך</span>
        <div class="${mode==='sleep'?'legend-gradient':'legend-gradient-wake'}"></div>
        <span>גבוה</span>
      </div>
    </div>`;
}

      <div class="stat-lbl">פיהוק → שינה</div>
      <div class="stat-sub">ממוצע</div>
    </div>
    <div class="stat-card c-feed">
      <div class="stat-icon">📊</div>
      <div class="stat-val">${totalSleeps}</div>
      <div class="stat-lbl">סה"כ שינות</div>
      <div class="stat-sub">${sortedDays.length} ימים</div>
    </div>
  `;

  // WW distribution
  const short=allWW.filter(w=>w<30).length;
  const norm=allWW.filter(w=>w>=30&&w<=90).length;
  const long=allWW.filter(w=>w>90).length;
  const total=allWW.length||1;
  const pShort=Math.round(short/total*100);
  const pNorm=Math.round(norm/total*100);
  const pLong=Math.round(long/total*100);

  document.getElementById('ww-dist').innerHTML = `
    <h3>חלוקת חלוני ערות (${allWW.length} מדידות)</h3>
    <div class="ww-bar-wrap">
      <div class="ww-bar-label"><span>⚡ קצר מ-30ד׳</span><span>${short} (${pShort}%)</span></div>
      <div class="ww-bar-track"><div class="ww-bar-fill" style="width:${pShort}%;background:var(--sun)"></div></div>
    </div>
    <div class="ww-bar-wrap">
      <div class="ww-bar-label"><span>✅ נורמלי 30–90ד׳</span><span>${norm} (${pNorm}%)</span></div>
      <div class="ww-bar-track"><div class="ww-bar-fill" style="width:${pNorm}%;background:var(--feed)"></div></div>
    </div>
    <div class="ww-bar-wrap">
      <div class="ww-bar-label"><span>🔴 ארוך מ-90ד׳</span><span>${long} (${pLong}%)</span></div>
      <div class="ww-bar-track"><div class="ww-bar-fill" style="width:${pLong}%;background:var(--cry)"></div></div>
    </div>
  `;

  // Per-day table
  let rows = '';
  sortedDays.reverse().forEach(day => {
    const evs=days[day];
    const wws=getWakeWindows(evs);
    const slDurs=getSleepDurs(evs);
    const sleeps=evs.filter(e=>e.type==='sleep').length;
    const avgW=wws.length?avg(wws):null;
    const cls=avgW?(avgW<30?'pill-short':avgW>90?'pill-long':'pill-ok'):'';
    rows += `<tr>
      <td>${heDate(day)}</td>
      <td>${sleeps}</td>
      <td>${avgW?`<span class="pill ${cls}">${fmtDur(avgW)}</span>`:'–'}</td>
      <td>${slDurs.length?fmtDur(Math.min(...slDurs)):'–'}</td>
      <td>${slDurs.length?fmtDur(Math.max(...slDurs)):'–'}</td>
    </tr>`;
  });

  document.getElementById('per-day').innerHTML = `<table>
    <thead><tr>
      <th>תאריך</th><th>שינות</th><th>חלון ממוצע</th><th>שינה קצרה</th><th>שינה ארוכה</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ════════════════════════════════════
// ADD / DELETE
// ════════════════════════════════════
function addEntry() {
  const d=document.getElementById('inp-date').value;
  const t=document.getElementById('inp-time').value;
  const type=document.getElementById('inp-type').value;
  const note=document.getElementById('inp-note').value.trim();
  if(!d||!t){alert('נא למלא תאריך ושעה');return;}
  const entry={d,t,type,note,id:Date.now()};
  document.getElementById('inp-note').value='';
  if(window._fbReady) { window._fbAddEntry(entry); }
  else { entries.push(entry); save(); renderPage(currentPage); }
}

function delEntry(id) {
  if(window._fbReady) { window._fbDeleteEntry(id); }
  else { entries=entries.filter(e=>e.id!==id); save(); renderPage(currentPage); }
}

// EDIT MODAL
let editingId = null;

function openEditModal(id) {
  const e = entries.find(x=>x.id===id);
  if (!e) return;
  editingId = id;
  document.getElementById('edit-date').value = e.d;
  document.getElementById('edit-time').value = e.t;
  document.getElementById('edit-type').value = e.type;
  document.getElementById('edit-note').value = e.note || '';
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingId = null;
}

function closeModal(ev) {
  if (ev.target === document.getElementById('edit-modal')) closeEditModal();
}

function saveEdit() {
  if (!editingId) return;
  const idx = entries.findIndex(x=>x.id===editingId);
  if (idx === -1) return;
  const d = document.getElementById('edit-date').value;
  const t = document.getElementById('edit-time').value;
  if (!d || !t) { alert('נא למלא תאריך ושעה'); return; }
  entries[idx].d    = d;
  entries[idx].t    = t;
  entries[idx].type = document.getElementById('edit-type').value;
  entries[idx].note = document.getElementById('edit-note').value.trim();
  closeEditModal();
  if(window._fbReady) { window._fbUpdateEntry(entries[idx]); }
  else { save(); renderPage(currentPage); }
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeEditModal(); });

function setNow() {
  const n=new Date();
  const pad=x=>String(x).padStart(2,'0');
  document.getElementById('inp-date').value=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
  document.getElementById('inp-time').value=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
}

// ════════════════════════════════════
// MOBILE ADD SHEET
// ════════════════════════════════════
let selectedType = 'wake';

function selectType(type, btn) {
  selectedType = type;
  document.querySelectorAll('#type-grid .type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function openAddSheet() {
  setNowSheet();
  document.getElementById('add-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAddSheet() {
  document.getElementById('add-sheet').classList.remove('open');
  document.body.style.overflow = '';
}

function closeAddSheetBackdrop(ev) {
  if (ev.target === document.getElementById('add-sheet')) closeAddSheet();
}

function setNowSheet() {
  const n = new Date();
  const pad = x => String(x).padStart(2,'0');
  document.getElementById('sheet-date').value = `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
  document.getElementById('sheet-time').value = `${pad(n.getHours())}:${pad(n.getMinutes())}`;
}

function addEntrySheet() {
  const d    = document.getElementById('sheet-date').value;
  const t    = document.getElementById('sheet-time').value;
  const note = document.getElementById('sheet-note').value.trim();
  if (!d || !t) { alert('נא למלא תאריך ושעה'); return; }
  const entry = { d, t, type: selectedType, note, id: Date.now() };
  document.getElementById('sheet-note').value = '';
  closeAddSheet();
  if(window._fbReady) { window._fbAddEntry(entry); }
  else { entries.push(entry); save(); renderPage(currentPage); }
}

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
function init() {
  window._SEED = SEED;
  load();
  setNow();
  updateAge();
  tickClock();
  setInterval(tickClock, 10000);
  renderDashboard();
  window.dispatchEvent(new Event('appReady'));
}

// track current page for Firebase re-renders
window._currentPage = 'dashboard';

init();
</script>
</body>
</html>
